
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Management - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        /* Navbar Styling */
        .navbar {
            padding: 1.5rem 0;
            background: transparent;
        }
        .navbar-brand img {
            height: 40px;
        }
        .nav-link {
            font-weight: 500;
            color: #555 !important;
            margin: 0 15px;
        }
        .btn-register-nav {
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            padding: 8px 25px;
            font-weight: 600;
            border: none;
        }
        .btn-register-nav:hover {
            background-color: #45a049;
            color: white;
        }

        /* Hero Section */
        .hero-section {
            padding: 100px 0;
            min-height: 80vh;
            display: flex;
            align-items: center;
        }
        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 20px;
        }
        .hero-subtitle {
            font-size: 1.2rem;
            color: #777;
            margin-bottom: 30px;
        }
        .btn-hero-register {
            background-color: #5cb85c;
            color: white;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(92, 184, 92, 0.3);
        }
        .btn-hero-register:hover {
            background-color: #4cae4c;
            transform: translateY(-2px);
        }

        /* Illustration placeholder */
        .hero-image {
            max-width: 100%;
            height: auto;
        }

        /* Pagination dots */
        .dot-container {
            text-align: center;
            margin-top: 50px;
        }
        .dot {
            height: 12px;
            width: 12px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin: 0 5px;
            cursor: pointer;
        }
        .dot.active {
            background-color: #5cb85c;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="https://via.placeholder.com/40x40?text=W" alt="Logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item">
                        <a href="auth/register" class="btn btn-register-nav ms-lg-3">Register Now &rarr;</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="hero-title">Thesis Management</h1>
                    <p class="hero-subtitle">This application manages the thesis submission</p>
                    <div class="mt-4">
                        <a href="auth/login" class="btn btn-hero-register">Login</a>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <img src="https://img.freepik.com/free-vector/programming-concept-illustration_114360-1351.jpg" 
                         alt="Thesis Illustration" class="hero-image">
                </div>
            </div>

        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
